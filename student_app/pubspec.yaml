name: student_app
description: "MVC CSG Attendance — Student app (digital QR ID, calendar, history, excuses, fines)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  supabase_flutter: ^2.15.4

# app_links >= 6.4 needs a newer Android Gradle Plugin than Flutter 3.24.5
# projects use; 6.3.x builds fine and satisfies supabase_flutter.
dependency_overrides:
  app_links: 6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sg-logo.png
